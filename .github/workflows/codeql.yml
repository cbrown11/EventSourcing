name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 5 * * 3"

jobs:
  analyze:
    name: Analyze (csharp)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require GitHub Packages read token
        shell: bash
        env:
          GPR_READ: ${{ secrets.GH_PACKAGES_READ_TOKEN }}
        run: |
          if [ -z "$GPR_READ" ]; then
            echo "::error::Missing secret GH_PACKAGES_READ_TOKEN. Add a PAT with read:packages for the GitHub account that owns the cbrown11 NuGet feed."
            exit 1
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          source-url: https://nuget.pkg.github.com/cbrown11/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_READ_TOKEN }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          queries: +security-and-quality

      - name: Restore and build
        run: |
          dotnet restore EventSourcing.sln
          dotnet build EventSourcing.sln -c Release --no-restore

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp"
